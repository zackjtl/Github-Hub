name: Deploy GitHub Dashboard to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check-pages:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - name: Check whether GitHub Pages is enabled
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")

          if [ "${STATUS}" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled. Proceeding with deployment."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled yet (HTTP ${STATUS}). Skipping deployment."
          fi

  build:
    needs: check-pages
    if: needs.check-pages.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute base path
        id: base
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          BASE_PATH: ${{ steps.base.outputs.base }}
          PORT: "3000"
          NODE_ENV: production
        run: pnpm --filter @workspace/github-dashboard run build

      - name: SPA fallback (404.html) + .nojekyll
        run: |
          cp artifacts/github-dashboard/dist/public/index.html \
             artifacts/github-dashboard/dist/public/404.html
          touch artifacts/github-dashboard/dist/public/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/github-dashboard/dist/public

  deploy:
    needs: [check-pages, build]
    if: needs.check-pages.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
