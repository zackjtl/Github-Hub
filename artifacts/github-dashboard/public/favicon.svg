<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E3A8A"/>
      <stop offset="0.5" stop-color="#4C1D95"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E0E7FF"/>
      <stop offset="1" stop-color="#A5B4FC"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FBBF24" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <circle cx="90" cy="90" r="48" fill="url(#glow)"/>

  <!-- Branch graph: two branches forking off a trunk and merging into a hub -->
  <g stroke="url(#line)" stroke-width="9" stroke-linecap="round" fill="none">
    <!-- left branch -->
    <path d="M 50 134 V 90 Q 50 70 70 70 H 90"/>
    <!-- right branch -->
    <path d="M 130 46 V 90 Q 130 110 110 110 H 90"/>
  </g>

  <!-- Nodes -->
  <circle cx="50" cy="134" r="13" fill="#22D3EE" stroke="#0F172A" stroke-width="4"/>
  <circle cx="130" cy="46"  r="13" fill="#A78BFA" stroke="#0F172A" stroke-width="4"/>

  <!-- Central hub node -->
  <circle cx="90" cy="90" r="22" fill="#FBBF24" stroke="#0F172A" stroke-width="5"/>
  <circle cx="90" cy="90" r="7"  fill="#0F172A"/>
</svg>
